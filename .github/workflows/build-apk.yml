name: Build APK

on:
  push:
    tags:
      - 'v*'           # triggers on v1.0.0, v1.2.3-beta, etc.

# Only one build at a time per tag
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & sign APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed so versionCode can count commits

      # ── 2. Parse tag version ─────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"          # e.g. v1.2.3
          VERSION="${TAG#v}"                       # e.g. 1.2.3
          # versionCode = total commit count (always incrementing)
          CODE=$(git rev-list --count HEAD)
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE"       >> $GITHUB_OUTPUT
          echo "::notice::Building $TAG  |  versionName=$VERSION  |  versionCode=$CODE"

      # ── 3. Node.js + pnpm ────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Build Nuxt web assets ─────────────────────────────────────────
      - name: Build Nuxt (nuxt generate)
        run: pnpm generate
        env:
          NODE_ENV: production

      # ── 5. Capacitor sync ────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 6. Java / Android SDK ────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Inject version into build.gradle ──────────────────────────────
      - name: Patch versionCode / versionName
        run: |
          sed -i \
            "s/versionCode .*/versionCode ${{ steps.version.outputs.code }}/" \
            android/app/build.gradle
          sed -i \
            "s/versionName .*/versionName \"${{ steps.version.outputs.version }}\"/" \
            android/app/build.gradle

      # ── 8. Decode keystore ───────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/vorb-release.jks

      # ── 9. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/vorb-release.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --stacktrace

      # ── 10. Rename APK with tag ──────────────────────────────────────────
      - name: Rename APK
        run: |
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          APK_DST="vorb-${{ steps.version.outputs.tag }}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV

      # ── 11. Upload APK as workflow artifact ──────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vorb-${{ steps.version.outputs.tag }}-apk
          path: ${{ env.APK_PATH }}
          retention-days: 90

      # ── 12. Create GitHub Release & attach APK ───────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "Orb Finance ${{ steps.version.outputs.tag }}"
          body:       |
            ## Orb Finance ${{ steps.version.outputs.tag }}

            ### Install
            Download `vorb-${{ steps.version.outputs.tag }}.apk` below and
            sideload it on your Android device.

            > **Enable unknown sources:** Settings → Security → Install unknown apps

            ### What's in this build
            - versionCode: `${{ steps.version.outputs.code }}`
            - versionName: `${{ steps.version.outputs.version }}`
            - Built from commit: `${{ github.sha }}`
          files:      ${{ env.APK_PATH }}
          draft:      false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          # tags like v1.0.0-beta automatically become pre-releases

      # ── 13. Build summary ────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ Build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| versionName | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | \`${{ steps.version.outputs.code }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY